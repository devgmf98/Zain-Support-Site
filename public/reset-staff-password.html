<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Staff Password</title>
  <link rel="stylesheet" href="/public/styles.css">
  <style>
    body { background: #f4f6fb; font-family: 'Segoe UI', Arial, sans-serif; }
    .form-section { max-width: 420px; margin: 60px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(102,126,234,0.10); padding: 36px 32px 32px 32px; border: 1px solid #e0e0e0; }
    .header { margin-bottom: 18px; }
    .header h2 { font-size: 24px; margin-bottom: 6px; }
    .header p { font-size: 14px; color: #666; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
    .form-group input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 15px; }
    .button-group { display: flex; gap: 10px; margin-top: 10px; }
    .btn-update { background: linear-gradient(90deg, #667eea, #5a67d8); color: #fff; border: none; padding: 10px 18px; border-radius: 5px; font-weight: 600; cursor: pointer; }
    .btn-clear { background: #f4f6fb; color: #333; border: 1px solid #e0e0e0; padding: 10px 18px; border-radius: 5px; font-weight: 500; cursor: pointer; }
    .info-box { margin-top: 24px; background: #f9fafb; border-radius: 6px; padding: 14px 16px; font-size: 13px; color: #555; }
    .alert { margin-bottom: 12px; display: none; }
    .alert.show { display: block; }
    .alert-success { color: #155724; background: #d4edda; border: 1px solid #c3e6cb; border-radius: 5px; padding: 10px; }
    .alert-error { color: #721c24; background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 5px; padding: 10px; }
  </style>
</head>
<body>
  <div class="form-section">
    <div class="header">
      <h2>🔑 Reset Staff Password</h2>
      <p>Admins can reset the password for any staff user. Enter the staff username and new password below.</p>
    </div>
    <div id="resetStaffPasswordAlert" class="alert"></div>
    <form id="resetStaffPasswordForm" autocomplete="off">
      <div class="form-group">
        <label for="resetStaffUsername">Staff Username <span style="color: #e74c3c;">*</span></label>
        <input type="text" id="resetStaffUsername" required placeholder="Enter staff username" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="resetStaffNewPassword">New Password <span style="color: #e74c3c;">*</span></label>
        <input type="password" id="resetStaffNewPassword" required placeholder="Enter new password" autocomplete="new-password">
      </div>
      <div class="button-group">
        <button type="submit" class="btn-update">Reset Password</button>
        <button type="reset" class="btn-clear">Clear</button>
      </div>
    </form>
    <div class="info-box">
      <strong>ℹ️ Information:</strong> Only admins can reset passwords for staff users. Enter the staff username and new password to update. Password must be at least 6 characters.
    </div>
  </div>
  <script>
    document.getElementById('resetStaffPasswordForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('resetStaffUsername').value.trim();
      const newPassword = document.getElementById('resetStaffNewPassword').value;
      const alertDiv = document.getElementById('resetStaffPasswordAlert');
      alertDiv.textContent = '';
      alertDiv.className = 'alert';
      if (!username || !newPassword) {
        alertDiv.textContent = 'Please enter both staff username and new password.';
        alertDiv.classList.add('alert-error', 'show');
        return;
      }
      try {
        const response = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, newPassword })
        });
        const data = await response.json();
        if (data.success) {
          alertDiv.textContent = data.message || 'Password reset successfully.';
          alertDiv.classList.add('alert-success', 'show');
        } else {
          alertDiv.textContent = data.message || 'Failed to reset password.';
          alertDiv.classList.add('alert-error', 'show');
        }
      } catch (err) {
        alertDiv.textContent = 'An error occurred. Please try again.';
        alertDiv.classList.add('alert-error', 'show');
      }
    });
  </script>
</body>
</html>
