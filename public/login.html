<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Support - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #456882 0%, #234C6A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 35px;
            max-width: 340px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #456882;
            font-size: 26px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #456882 0%, #2563eb 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            margin: 0 auto 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
            color: #333;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #456882;
            box-shadow: 0 0 0 4px rgba(69, 104, 130, 0.1);
            background-color: #fafbff;
        }

        .form-group.error input {
            border-color: #f87171;
            background-color: #fef2f2;
        }

        .error-message {
            color: #dc2626;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease-out;
            border-left: 4px solid;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background-color: #fef2f2;
            color: #dc2626;
            border-left-color: #dc2626;
        }

        .alert-success {
            background-color: #f0fdf4;
            color: #15803d;
            border-left-color: #15803d;
        }

        .demo-credentials {
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            margin-top: 25px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .demo-credentials strong {
            color: #333;
            display: block;
            margin-bottom: 8px;
        }

        .demo-credentials code {
            background: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #456882;
            margin: 0 3px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 25px;
            border-top: 1px solid #e5e7eb;
            padding-top: 15px;
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">🔐</div>
            <h1>Zain Support</h1>
            <p>Staffs Login Portal</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Enter your username"
                    autocomplete="username"
                    required
                >
                <div class="error-message" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                >
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" class="login-button" id="loginBtn">
                Login
            </button>
        </form>

        <div class="demo-credentials">
            <strong>📋 Demo Credentials</strong>
            <div><code>admin</code> / <code>admin123</code></div>
            <div style="margin-top: 8px; color: #999; font-size: 12px;">OR</div>
            <div style="margin-top: 8px;"><code>staff</code> / <code>staff123</code></div>
        </div>

        <div class="footer-text">
            Powered by <strong>G-TECH</strong> | Customer Lifecycle Management Platform
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const alert = document.getElementById('alert');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            // Disable button and show loading
            loginBtn.disabled = true;
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="spinner"></span>Logging in...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                let data;
                if (!response.ok) {
                    // Try to parse error message as JSON, fallback to text
                    try {
                        data = await response.json();
                    } catch (err) {
                        const text = await response.text();
                        showAlert(text || 'Login failed. Please try again.', 'error');
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = originalText;
                        passwordInput.value = '';
                        return;
                    }
                    showAlert(data.message || 'Login failed. Please try again.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = originalText;
                    passwordInput.value = '';
                    return;
                } else {
                    try {
                        data = await response.json();
                    } catch (err) {
                        const text = await response.text();
                        showAlert('Invalid server response: ' + text, 'error');
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = originalText;
                        passwordInput.value = '';
                        return;
                    }
                }

                showAlert('Login successful! Redirecting...', 'success');
                
                // Show password expiration warning if present
                if (data.passwordExpirationWarning) {
                    console.log('Password expiration warning:', data.passwordExpirationWarning);
                    // Store warning in sessionStorage to display on next page
                    sessionStorage.setItem('passwordExpirationWarning', data.passwordExpirationWarning);
                }
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalText;
            }
        });

        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;
            setTimeout(() => alert.classList.remove('show'), 4000);
        }

        // Clear errors on input
        usernameInput.addEventListener('input', () => {
            document.getElementById('usernameError').classList.remove('show');
        });

        passwordInput.addEventListener('input', () => {
            document.getElementById('passwordError').classList.remove('show');
        });

        // Auto-focus on page load
        window.addEventListener('load', () => {
            usernameInput.focus();
        });
    </script>
</body>
</html>
